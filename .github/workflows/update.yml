name: Update calendar
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      AIRBNB_ICAL_URL: ${{ secrets.AIRBNB_ICAL_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests icalendar
      - run: python fetch_calendar.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add availability.json
          git diff --staged --quiet || git commit -m "update calendar"
          git push
